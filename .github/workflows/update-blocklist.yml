name: Update Blocklist & Publish

on:
    workflow_dispatch:
        inputs:
            reason:
                description: 'Reason for manual trigger'
                required: false
                default: 'Manual run'

    schedule:
        -   cron: '0 4 * * *'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    update_and_publish:
        runs-on: ubuntu-latest

        # Permissions for GitHub App
        permissions:
            contents: write # For committing and pushing branches
            pull-requests: write # For creating and merging PRs
            # If your release workflow is triggered by tags or pushes, you might need:
            # deployments: write
            # packages: write
            # statuses: write

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

                with:
                # Required for creating PRs and pushing to branches
                # Use a PAT or GitHub App token here, NOT GITHUB_TOKEN
                #token: ${{ secrets.BOT_PAT }} # Replace with your GitHub App token setup

            -   name: Use Node.js 22.x
                uses: actions/setup-node@v4
                with:
                    node-version: 22.x
                    cache: 'npm'

            -   name: Install dependencies
                run: npm ci

            -   name: Run Blocklist Update Script
                run: npm run update-blocklist

            -   name: Check for Changes
                id: git_status
                run: |
                    git add data/BLOCKLIST
                    git diff --cached --exit-code --quiet || echo "::set-output name=changes_detected::true"

            -   name: Configure Git user
                if: steps.git_status.outputs.changes_detected == 'true'
                run: |
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"

            -   name: Create branch and commit
                id: create_commit
                if: steps.git_status.outputs.changes_detected == 'true'
                run: |
                    BRANCH_NAME="bot/update-blocklist-$(date +%Y%m%d%H%M%S)"
                    git checkout -b $BRANCH_NAME
                    git commit -m "feat(blocklist): Update disposable email domains" -m "This PR automatically updates the disposable email domains blocklist from the upstream source."
                    git push origin $BRANCH_NAME
                    echo "::set-output name=branch_name::$BRANCH_NAME"
                    echo "::set-output name=commit_sha::$(git rev-parse HEAD)"

            -   name: Create PR
                id: create_pr
                if: steps.git_status.outputs.changes_detected == 'true'
                uses: actions/github-script@v7
                with:
                    github-token: ${{ secrets.BOT_PAT }} # Use the bot token here
                    script: |
                        const { data: pull } = await github.rest.pulls.create({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          title: 'feat(blocklist): Update disposable email domains',
                          head: process.env.BRANCH_NAME,
                          base: 'main',
                          body: 'This is an automated PR to update the disposable email domains blocklist.',
                          draft: false
                        });
                        core.setOutput('pr_number', pull.number);
                        core.setOutput('pr_url', pull.html_url);
                        console.log(`Created PR #${pull.number}: ${pull.html_url}`);
                env:
                    BRANCH_NAME: ${{ steps.create_commit.outputs.branch_name }}

            -   name: Wait for PR checks to pass
                uses: SFTtech/wait_for_status@v1.1
                if: steps.create_pr.outputs.pr_number # Only run if a PR was created
                with:
                    check_name: 'test' # Replace with the actual name of your test workflow/job
                    repo_token: ${{ secrets.BOT_PAT }}
                    ref: ${{ steps.create_commit.outputs.commit_sha }} # Check the PR's head commit
                    # You might need to add other check names if you have more required checks
                    # e.g., 'lint', 'build'

            -   name: Merge PR
                if: steps.create_pr.outputs.pr_number && success() # Only if PR created AND previous step succeeded
                uses: actions/github-script@v7
                with:
                    github-token: ${{ secrets.BOT_PAT }} # Use the bot token here
                    script: |
                        const pr_number = Number(core.getInput('pr_number'));
                        const { data: pullRequest } = await github.rest.pulls.get({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: pr_number,
                        });

                        if (pullRequest.mergeable && pullRequest.state === 'open') {
                          console.log(`Attempting to merge PR #${pr_number}`);
                          await github.rest.pulls.merge({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            pull_number: pr_number,
                            merge_method: 'squash', // or 'merge' or 'rebase'
                            commit_title: pullRequest.title,
                            commit_message: pullRequest.body,
                          });
                          console.log(`PR #${pr_number} merged successfully.`);
                        } else {
                          console.warn(`PR #${pr_number} is not mergeable or already closed. Skipping merge.`);
                          // If not mergeable, it implies conflicts or failed checks.
                          // You might want to assign a reviewer here if auto-merge fails.
                        }
                env:
                    PR_NUMBER: ${{ steps.create_pr.outputs.pr_number }}

            -   name: Calculate new version
                id: get_version
                if: steps.create_pr.outputs.pr_number && success() # Only if PR merged
                run: |
                    CURRENT_VERSION=$(node -p "require('./package.json').version")
                    IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
                    NEW_PATCH=$((patch + 1))
                    NEW_VERSION="${major}.${minor}.${NEW_PATCH}"
                    echo "::set-output name=current_version::$CURRENT_VERSION"
                    echo "::set-output name=new_version::$NEW_VERSION"
                    echo "Calculated new version: $NEW_VERSION (from $CURRENT_VERSION)"

            -   name: Update package.json version
                if: steps.get_version.outputs.new_version
                run: |
                    npm version ${{ steps.get_version.outputs.new_version }} --no-git-tag-version

            -   name: Push new version commit and tag
                if: steps.get_version.outputs.new_version
                run: |
                    git add package.json
                    git commit -m "chore(release): v${{ steps.get_version.outputs.new_version }}"
                    git tag v${{ steps.get_version.outputs.new_version }}
                    git push origin main
                    git push origin v${{ steps.get_version.outputs.new_version }}
                env:
                    GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
